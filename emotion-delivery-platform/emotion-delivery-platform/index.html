    <script>
        // Suppress Babel Standalone console warning
        const originalWarn = console.warn;
        console.warn = (...args) => {
            if (args[0] && typeof args[0] === 'string' && args[0].includes("You are using the in-browser Babel transformer")) return;
            originalWarn.apply(console, args);
        };

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0D0D1A;
            background-image: radial-gradient(ellipse at 15% 25%, rgba(232, 93, 154, .13) 0%, transparent 55%), radial-gradient(ellipse at 85% 75%, rgba(139, 92, 246, .13) 0%, transparent 55%);
            min-height: 100vh;
            color: #fff;
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, .03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .07);
        }

        .glass-hover {
            background: rgba(255, 255, 255, .03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .07);
            transition: all .3s cubic-bezier(.4, 0, .2, 1);
        }

        .glass-hover:hover {
            background: rgba(255, 255, 255, .06);
            border-color: rgba(232, 93, 154, .25);
            transform: translateY(-3px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, .3);
        }

        .glass-input {
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            transition: all .2s;
            color: #fff;
            outline: none;
        }

        .glass-input:focus {
            border-color: #E85D9A;
            background: rgba(255, 255, 255, .08);
            box-shadow: 0 0 0 3px rgba(232, 93, 154, .15);
        }

        .gbtn {
            background: linear-gradient(135deg, #E85D9A, #8B5CF6);
            transition: all .3s;
            cursor: pointer;
            border: none;
        }

        .gbtn:hover {
            box-shadow: 0 12px 32px rgba(232, 93, 154, .4);
            transform: translateY(-1px);
        }

        .gbtng {
            background: linear-gradient(135deg, #F59E0B, #D97706);
            transition: all .3s;
            cursor: pointer;
            border: none;
        }

        .gbtng:hover {
            box-shadow: 0 12px 32px rgba(245, 158, 11, .35);
            transform: translateY(-1px);
        }

        .hero-text {
            background: linear-gradient(135deg, #E85D9A 0%, #8B5CF6 50%, #60A5FA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .paper-lines {
            background-image: repeating-linear-gradient(transparent, transparent 31px, rgba(232, 93, 154, .12) 32px);
            background-size: 100% 32px;
            line-height: 32px;
        }

        .toggle {
            width: 52px;
            height: 28px;
            border-radius: 14px;
            cursor: pointer;
            transition: background .3s;
            position: relative;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .1);
            flex-shrink: 0;
            display: inline-block;
        }

        .toggle.on {
            background: linear-gradient(135deg, #E85D9A, #8B5CF6);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            transition: transform .3s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, .3);
        }

        .toggle.on::after {
            transform: translateX(24px);
        }

        .step-n {
            background: linear-gradient(135deg, rgba(232, 93, 154, .2), rgba(139, 92, 246, .2));
            border: 1px solid rgba(232, 93, 154, .3);
        }

        @keyframes ping {

            75%,
            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .badge-ping {
            animation: ping 1.4s cubic-bezier(0, 0, .2, 1) infinite;
        }

        .cat-card {
            transition: all .3s cubic-bezier(.4, 0, .2, 1);
            cursor: pointer;
        }

        .cat-card:hover {
            transform: translateY(-5px) scale(1.03);
        }

        .scroll-hide {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .scroll-hide::-webkit-scrollbar {
            display: none;
        }

        select option {
            background: #1A1A3E;
            color: #fff;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes slideIn {
            from {
                transform: translateY(16px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .slide-in {
            animation: slideIn .35s ease forwards;
        }

        .tl-line {
            position: absolute;
            left: 13px;
            top: 28px;
            bottom: -12px;
            width: 2px;
            background: linear-gradient(to bottom, rgba(232, 93, 154, .4), transparent);
        }

        /* LIGHT MODE */
        body.light-mode {
            background: #FCFAF5 !important;
            background-image: radial-gradient(ellipse at 15% 25%, rgba(255, 126, 103, .12) 0%, transparent 55%), radial-gradient(ellipse at 85% 75%, rgba(216, 67, 129, .12) 0%, transparent 55%) !important;
            color: #3A2A22 !important;
        }

        body.light-mode .glass {
            background: rgba(255, 255, 255, 0.85) !important;
            border-color: rgba(140, 122, 112, 0.2) !important;
            box-shadow: 0 8px 32px rgba(58, 42, 34, 0.05) !important;
        }

        body.light-mode .glass-hover {
            background: rgba(255, 255, 255, 0.75) !important;
            border-color: rgba(140, 122, 112, 0.18) !important;
        }

        body.light-mode .glass-hover:hover {
            background: #FFFFFF !important;
            border-color: #D84381 !important;
            box-shadow: 0 16px 36px rgba(58, 42, 34, 0.1) !important;
        }

        body.light-mode .glass-input {
            background: #FFFFFF !important;
            border-color: rgba(140, 122, 112, 0.3) !important;
            color: #3A2A22 !important;
        }

        body.light-mode .glass-input::placeholder {
            color: #8C7A70 !important;
        }

        body.light-mode .gbtn {
            background: linear-gradient(to right, #FF7E67, #D84381) !important;
            color: #FFFFFF !important;
        }

        body.light-mode header {
            background: rgba(255, 255, 255, 0.92) !important;
            border-bottom: 1px solid rgba(140, 122, 112, 0.15) !important;
            box-shadow: 0 4px 20px rgba(58, 42, 34, 0.05) !important;
        }

        body.light-mode footer {
            background: #F5F2EB !important;
            border-top: 1px solid rgba(140, 122, 112, 0.15) !important;
        }

        body.light-mode [style*="color: #fff"],
        body.light-mode [style*="color:'#fff'"],
        body.light-mode [style*="color: white"] {
            color: #3A2A22 !important;
        }

        body.light-mode [style*="color: rgba(255,255,255"],
        body.light-mode [style*="color:'rgba(255,255,255"],
        body.light-mode [style*="color: rgba(255, 255, 255"] {
            color: #8C7A70 !important;
        }

        body.light-mode [style*="background: rgba(255,255,255"],
        body.light-mode [style*="background:'rgba(255,255,255"],
        body.light-mode [style*="background: rgba(255, 255, 255"] {
            background: rgba(140, 122, 112, 0.08) !important;
            border-color: rgba(140, 122, 112, 0.15) !important;
        }

        body.light-mode [style*="background: rgba(0,0,0"],
        body.light-mode [style*="background:'rgba(0,0,0"],
        body.light-mode [style*="background: rgba(0, 0, 0"] {
            background: rgba(252, 250, 245, 0.95) !important;
        }

        body.light-mode .step-n {
            background: rgba(216, 67, 129, 0.1) !important;
            border-color: rgba(216, 67, 129, 0.3) !important;
            color: #D84381 !important;
        }

        body.light-mode select option {
            background: #FFFFFF !important;
            color: #3A2A22 !important;
        }

        body.light-mode .gbtn [style*="color"] {
            color: #FFFFFF !important;
        }
    </style>
</head>

        function Toggle({ on, set }) { return <div className={'toggle' + (on ? ' on' : '')} onClick={() => set(!on)}></div>; }

        function Stars({ r }) { return <div style={{ display: 'flex', gap: '2px' }}>{[1, 2, 3, 4, 5].map(i => <svg key={i} style={{ width: '12px', height: '12px' }} fill={i <= Math.floor(r) ? '#F59E0B' : 'rgba(255,255,255,.12)'} viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" /></svg>)}</div>; }

        function Toast({ msg, type, show }) {
            if (!show) return null;
            const bg = type === 'error' ? '#ef4444' : type === 'warn' ? '#f59e0b' : type === 'info' ? '#3b82f6' : '#10b981';
            const ic = type === 'error' ? 'X' : type === 'warn' ? '!' : 'OK';
            return <div style={{ position: 'fixed', top: '72px', right: '16px', zIndex: 9999, background: bg, color: '#fff', padding: '12px 20px', borderRadius: '16px', fontSize: '14px', fontWeight: 600, boxShadow: '0 20px 40px rgba(0,0,0,.4)', display: 'flex', alignItems: 'center', gap: '10px', maxWidth: '340px', animation: 'slideIn .35s ease forwards' }}><span>{ic}</span><span>{msg}</span></div>;
        }

        // ── AUTHENTICATION PAGE (STRICT LOCAL DATABASE + ADMIN) ───────────────────────────────
        function AuthPage({ onLoginSuccess, toast_ }) {
            const [isLogin, setIsLogin] = React.useState(true);
            const [emailPhone, setEmailPhone] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [name, setName] = React.useState('');
            const [showPwd, setShowPwd] = React.useState(false); // State for Eye Icon

            const validateEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

            const handleSubmit = () => {
                if (!emailPhone || !password || (!isLogin && !name)) return toast_('Please fill all required fields', 'warn');
                if (!validateEmail(emailPhone)) return toast_('Please enter a valid email address', 'error');

                const normalizedEmail = emailPhone.toLowerCase().trim();

                // 👑 MASTER ADMIN BYPASS (Only this account gets Admin access)
                if (isLogin && normalizedEmail === 'admin@hardyy.in' && password === 'admin123') {
                    completeLogin(normalizedEmail, 'admin');
                    return toast_('Welcome back Boss! Admin Portal Unlocked 🛠️');
                }

                let users = [];
                try {
                    const storedUsers = localStorage.getItem('hardyy_users_db');
                    if (storedUsers) users = JSON.parse(storedUsers);
                } catch (e) { }

                if (isLogin) {
                    const userAccount = users.find(u => u.email === normalizedEmail);
                    if (!userAccount) return toast_('No account found. Please sign up!', 'error');
                    if (userAccount.password !== password) return toast_('Incorrect password.', 'error');

                    completeLogin(userAccount.email, 'customer');
                    toast_('Logged in successfully! 🚀');
                } else {
                    if (users.find(u => u.email === normalizedEmail)) return toast_('Email already exists! Please log in.', 'error');

                    users.push({ name: name.trim(), email: normalizedEmail, password: password });
                    try { localStorage.setItem('hardyy_users_db', JSON.stringify(users)); } catch (e) { }

                    completeLogin(normalizedEmail, 'customer');
                    toast_('Account created & logged in! 🎉');
                }
            };

            const completeLogin = (email, role) => {
                const mockTok = 'hardyy_tok_' + Math.random().toString(36).substring(2, 10);
                try {
                    localStorage.setItem('hardyy_token', mockTok);
                    localStorage.setItem('hardyy_role', role); // Saves whether they are Admin or Customer
                    localStorage.setItem('hardyy_current_user', email);
                } catch (e) { }
                onLoginSuccess(mockTok);
            };

            return (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', padding: '24px' }}>
                    <div className="glass slide-in" style={{ maxWidth: '440px', width: '100%', borderRadius: '28px', padding: '40px', textAlign: 'center', border: '1px solid rgba(232,93,154,.3)', boxShadow: '0 20px 40px rgba(0,0,0,.4)' }}>
                        <div style={{ fontSize: '48px', marginBottom: '16px' }}>🔒</div>
                        <h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: '28px', fontWeight: 700, marginBottom: '8px' }}>
                            {isLogin ? 'Welcome to Hardyy' : 'Create an Account'}
                        </h2>
                        <p style={{ color: 'rgba(255,255,255,.55)', fontSize: '14px', marginBottom: '24px' }}>
                            You must securely log in to view the platform.
                        </p>

                        <div style={{ display: 'flex', flexDirection: 'column', gap: '14px', textAlign: 'left' }}>
                            {!isLogin && (
                                <div>
                                    <label style={{ fontSize: '12px', color: 'rgba(255,255,255,.42)', marginBottom: '6px', display: 'block' }}>Full Name</label>
                                    <input type="text" placeholder="e.g. Rahul Sharma" value={name} onChange={e => setName(e.target.value)} className="glass-input" style={{ width: '100%', padding: '12px 16px', borderRadius: '12px', fontSize: '14px' }} />
                                </div>
                            )}
                            <div>
                                <label style={{ fontSize: '12px', color: 'rgba(255,255,255,.42)', marginBottom: '6px', display: 'block' }}>Email Address</label>
                                <input type="text" placeholder="email@hardyy.in" value={emailPhone} onChange={e => setEmailPhone(e.target.value)} className="glass-input" style={{ width: '100%', padding: '12px 16px', borderRadius: '12px', fontSize: '14px' }} />
                            </div>
                            <div>
                                <label style={{ fontSize: '12px', color: 'rgba(255,255,255,.42)', marginBottom: '6px', display: 'block' }}>Password</label>
                                <div style={{ position: 'relative' }}>
                                    <input type={showPwd ? "text" : "password"} placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} className="glass-input" style={{ width: '100%', padding: '12px 50px 12px 16px', borderRadius: '12px', fontSize: '14px' }} />
                                    <button onClick={() => setShowPwd(!showPwd)} style={{ position: 'absolute', right: '12px', top: '50%', transform: 'translateY(-50%)', background: 'none', border: 'none', cursor: 'pointer', color: '#f472b6', fontSize: '12px', fontWeight: 700 }}>
                                        {showPwd ? 'HIDE' : 'SHOW'}
                                    </button>

        function LoginModal({ onClose, toast_, onLoginSuccess }) {
            const [portal, setPortal] = useState('customer');
            const [view, setView] = useState('login');
            const [emailPhone, setEmailPhone] = useState('');
            const [password, setPassword] = useState('');
            const [otp, setOtp] = useState('');
            const [newPassword, setNewPassword] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = () => {
                if (!emailPhone || !password) {
                    return toast_(portal === 'delivery' ? 'Please enter mobile number and OTP' : 'Please enter email/mobile and password', 'warn');
                }
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    const mockTok = 'hardyy_tok_' + Math.random().toString(36).substring(2, 10);
                    try {
                        localStorage.setItem('hardyy_token', mockTok);
                        localStorage.setItem('hardyy_role', portal);
                    } catch (e) {
                        console.error('localStorage is blocked', e);
                    }
                    onLoginSuccess(mockTok);
                    toast_(`Logged in to ${portal.toUpperCase()} portal! 🚀`);
                    onClose();
                }, 800);
            };

            const handleForgotReq = () => {
                if (!emailPhone) return toast_('Please enter phone or email', 'warn');
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    toast_('OTP sent successfully! (Demo OTP: 123456)');
                    setView('forgot_verify');
                }, 800);
            };

            const handleForgotVerify = () => {
                if (!otp || !newPassword) return toast_('Enter OTP and new password', 'warn');
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    if (otp === '123456' || otp.length >= 4) {
                        toast_('Password reset successful! Please log in.');
                        setView('login');
                    } else {
                        toast_('Invalid OTP entered. Try 123456', 'error');
                    }
                }, 800);
            };

            return (
                <div style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(0,0,0,.85)', backdropFilter: 'blur(10px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px' }}>
                    <div className="glass slide-in" style={{ maxWidth: '440px', width: '100%', borderRadius: '28px', padding: '36px', position: 'relative', border: '1px solid rgba(255,255,255,.1)' }}>
                        <button onClick={onClose} style={{ position: 'absolute', top: '16px', right: '16px', background: 'none', border: 'none', color: 'rgba(255,255,255,.4)', cursor: 'pointer', fontSize: '22px', lineHeight: 1 }}>&#x2715;</button>

                        <div style={{ display: 'flex', background: 'rgba(255,255,255,.05)', padding: '4px', borderRadius: '14px', marginBottom: '24px' }}>

                                <button key={t.id} onClick={() => { setPortal(t.id); setView('login'); }} style={{ flex: 1, padding: '8px 4px', borderRadius: '10px', border: 'none', fontSize: '12px', fontWeight: 700, cursor: 'pointer', transition: 'all .2s', background: portal === t.id ? '#E85D9A' : 'transparent', color: portal === t.id ? '#fff' : 'rgba(255,255,255,.5)' }}>{t.l}</button>
                            ))}

                        {view === 'login' && (
                            <div>
                                <div style={{ textAlign: 'center', marginBottom: '24px' }}>
                                    <h3 style={{ fontFamily: "'Playfair Display',serif", fontSize: '24px', fontWeight: 700 }}>{portal === 'customer' ? 'Customer Sign In' : portal === 'staff' ? 'Staff Portal Login' : 'Delivery Partner Login'}</h3>
                                    <p style={{ color: 'rgba(255,255,255,.42)', fontSize: '13px', marginTop: '4px' }}>{portal === 'delivery' ? 'Enter registered mobile & OTP' : 'Sign in to access your dashboard'}</p>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                                    <div><label style={{ fontSize: '12px', color: 'rgba(255,255,255,.42)', display: 'block', marginBottom: '6px' }}>{portal === 'delivery' ? 'Mobile Number' : 'Email or Mobile'}</label><input type="text" placeholder={portal === 'delivery' ? '+91 98765 43210' : 'email@hardyy.in'} value={emailPhone} onChange={e => setEmailPhone(e.target.value)} className="glass-input" style={{ width: '100%', padding: '12px 16px', borderRadius: '12px', fontSize: '14px' }} /></div>
                                    <div><label style={{ fontSize: '12px', color: 'rgba(255,255,255,.42)', display: 'block', marginBottom: '6px' }}>{portal === 'delivery' ? 'Login OTP / Pin' : 'Password'}</label><input type="password" placeholder="..." value={password} onChange={e => setPassword(e.target.value)} className="glass-input" style={{ width: '100%', padding: '12px 16px', borderRadius: '12px', fontSize: '14px' }} /></div>
                                    {portal !== 'delivery' && <div style={{ display: 'flex', justifyContent: 'flex-end' }}><span onClick={() => setView('forgot_req')} style={{ fontSize: '12px', color: '#f472b6', cursor: 'pointer' }}>Forgot password?</span></div>}
                                    <button onClick={handleLogin} disabled={loading} className="gbtn" style={{ padding: '14px', borderRadius: '12px', fontWeight: 700, fontSize: '14px', color: '#fff', border: 'none', cursor: 'pointer' }}>{loading ? 'Signing in...' : `Login to ${portal.toUpperCase()}`}</button>
                                </div>
                            </div>
                        )}

                        {view === 'forgot_req' && (
                            <div>
                                <div style={{ textAlign: 'center', marginBottom: '24px' }}>
                                    <h3 style={{ fontFamily: "'Playfair Display',serif", fontSize: '24px', fontWeight: 700 }}>Reset Password</h3>
                                    <p style={{ color: 'rgba(255,255,255,.42)', fontSize: '13px', marginTop: '4px' }}>Enter your registered email or phone to receive an OTP</p>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                                    <div><label style={{ fontSize: '12px', color: 'rgba(255,255,255,.42)', display: 'block', marginBottom: '6px' }}>Registered Email / Phone</label><input type="text" placeholder="email@hardyy.in or +91 9876543210" value={emailPhone} onChange={e => setEmailPhone(e.target.value)} className="glass-input" style={{ width: '100%', padding: '12px 16px', borderRadius: '12px', fontSize: '14px' }} /></div>

                                </div>
                            </div>
                        )}

                        {view === 'forgot_verify' && (
                            <div>
                                <div style={{ textAlign: 'center', marginBottom: '24px' }}>
                                    <h3 style={{ fontFamily: "'Playfair Display',serif", fontSize: '24px', fontWeight: 700 }}>Enter OTP</h3>
                                    <p style={{ color: 'rgba(255,255,255,.42)', fontSize: '13px', marginTop: '4px' }}>We sent a 6-digit verification code to your email/phone</p>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                                    <div><label style={{ fontSize: '12px', color: 'rgba(255,255,255,.42)', display: 'block', marginBottom: '6px' }}>6-Digit OTP Code</label><input type="text" placeholder="123456" value={otp} onChange={e => setOtp(e.target.value)} className="glass-input" style={{ width: '100%', padding: '12px 16px', borderRadius: '12px', fontSize: '14px', letterSpacing: '4px', textAlign: 'center' }} /></div>
                                    <div><label style={{ fontSize: '12px', color: 'rgba(255,255,255,.42)', display: 'block', marginBottom: '6px' }}>New Password</label><input type="password" placeholder="At least 8 characters" value={newPassword} onChange={e => setNewPassword(e.target.value)} className="glass-input" style={{ width: '100%', padding: '12px 16px', borderRadius: '12px', fontSize: '14px' }} /></div>
                                    <button onClick={handleForgotVerify} disabled={loading} className="gbtn" style={{ padding: '14px', borderRadius: '12px', fontWeight: 700, fontSize: '14px', color: '#fff', border: 'none', cursor: 'pointer' }}>{loading ? 'Verifying...' : 'Reset & Login'}</button>

                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

            const orders = [{ id: 'EDP-482910', c: 'Rahul M.', s: 'Flowers Bandra', st: 'Packing', a: '₹3,299', t: '10m' }, { id: 'EDP-481847', c: 'Priya S.', s: 'Gift World Andheri', st: 'Out for Delivery', a: '₹1,799', t: '25m' }, { id: 'EDP-480562', c: 'Amit K.', s: 'Premium Gifts Powai', st: 'Delivered', a: '₹5,499', t: '2hr' }, { id: 'EDP-479100', c: 'Neha R.', s: 'Bloom Studio Juhu', st: 'Confirmed', a: '₹2,199', t: '35m' }];

            useEffect(() => {
                const checkSimCoords = () => {
                    try {
                        const saved = localStorage.getItem('hardyy_live_gps');
                        if (saved) {
                            const parsed = JSON.parse(saved);
                            setLiveCoords(prev => {
                                if (prev.length > 0 && prev[0].timestamp === parsed.timestamp) return prev;
                                return [parsed, ...prev.slice(0, 19)];
                            });
                        } else if (Math.random() > 0.4) {
                            const sim = {
                                partnerId: 'DLV-MUM-' + Math.floor(1000 + Math.random() * 9000),
                                lat: 19.0760 + (Math.random() - 0.5) * 0.05,
                                lng: 72.8777 + (Math.random() - 0.5) * 0.05,
                                speed: Math.floor(22 + Math.random() * 20) + ' km/h',
                                timestamp: new Date().toISOString()
                            };
                            setLiveCoords(prev => [sim, ...prev.slice(0, 19)]);
                        }
                    } catch (e) {
                        console.error(e);
                    }
                };
                checkSimCoords();
                const timer = setInterval(checkSimCoords, 3000);
                return () => clearInterval(timer);

                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: '16px' }}>
                                {stats.map(s => <div key={s.l} className="glass" style={{ borderRadius: '20px', padding: '20px' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '12px' }}><span style={{ fontSize: '24px' }}>{s.i}</span><span style={{ fontSize: '12px', fontWeight: 700, color: '#6ee7b7' }}>{s.ch}</span></div>
                                    <div style={{ fontFamily: "'Playfair Display',serif", fontSize: '26px', fontWeight: 700, color: s.c }}>{s.v}</div>
                                    <div style={{ fontSize: '12px', color: 'rgba(255,255,255,.38)', marginTop: '4px' }}>{s.l}</div>
                                </div>)}
                            </div>
                            <div className="glass" style={{ borderRadius: '20px', padding: '24px' }}>
                                <h3 style={{ fontWeight: 700, marginBottom: '16px' }}>Recent Orders</h3>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                    {orders.map(o => <div key={o.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '14px 16px', borderRadius: '12px', background: 'rgba(255,255,255,.02)', border: '1px solid rgba(255,255,255,.06)' }}>
                                        <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                                            <span style={{ fontSize: '12px', fontFamily: 'monospace', color: '#f472b6' }}>{o.id}</span>
                                            <div><div style={{ fontSize: '13px', fontWeight: 600 }}>{o.c}</div><div style={{ fontSize: '11px', color: 'rgba(255,255,255,.35)' }}>{o.s}</div></div>
                                        </div>
                                        <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                                            <span style={{ padding: '4px 10px', borderRadius: '8px', fontSize: '11px', fontWeight: 700, background: o.st === 'Delivered' ? 'rgba(16,185,129,.12)' : o.st === 'Out for Delivery' ? 'rgba(59,130,246,.12)' : o.st === 'Packing' ? 'rgba(245,158,11,.12)' : 'rgba(255,255,255,.06)', color: o.st === 'Delivered' ? '#6ee7b7' : o.st === 'Out for Delivery' ? '#93c5fd' : o.st === 'Packing' ? '#fcd34d' : 'rgba(255,255,255,.45)' }}>{o.st}</span>
                                            <span style={{ fontSize: '13px', fontWeight: 700 }}>{o.a}</span>
                                            <span style={{ fontSize: '11px', color: 'rgba(255,255,255,.25)' }}>{o.t} ago</span>
                                        </div>
                                    </div>)}
                                </div>
                            </div>
                        </div>}
                        {tab === 'tracking' && <div className="glass" style={{ borderRadius: '20px', padding: '24px' }}>
                            <h3 style={{ fontWeight: 700, marginBottom: '16px' }}>📍 Real-Time Local GPS Tracking (Simulated)</h3>
                            <p style={{ fontSize: '12px', color: 'rgba(255,255,255,.4)', marginBottom: '16px' }}>Listening for live GPS coordinates emitted by Delivery Partners...</p>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px', maxHeight: '400px', overflowY: 'auto' }}>
                                {liveCoords.length === 0 ? (
                                    <div style={{ padding: '32px', textAlign: 'center', color: 'rgba(255,255,255,.3)' }}>No active partners emitting GPS coordinates yet.</div>
                                ) : (
                                    liveCoords.map((c, idx) => (
                                        <div key={idx} style={{ padding: '12px 16px', borderRadius: '10px', background: 'rgba(16,185,129,.08)', border: '1px solid rgba(16,185,129,.2)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                            <div>
                                                <div style={{ fontWeight: 700, fontSize: '13px', color: '#6ee7b7' }}>🛵 Partner ID: {c.partnerId || 'DLV-8849'}</div>
                                                <div style={{ fontSize: '11px', color: 'rgba(255,255,255,.5)', marginTop: '2px' }}>Lat: {c.lat?.toFixed(5)} | Lng: {c.lng?.toFixed(5)} | Speed: {c.speed || '24 km/h'}</div>
                                            </div>
                                            <div style={{ fontSize: '11px', color: 'rgba(255,255,255,.4)' }}>{new Date(c.timestamp || Date.now()).toLocaleTimeString()}</div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>}
                        {tab === 'analytics' && <div className="glass" style={{ borderRadius: '20px', padding: '24px' }}>
                            <h3 style={{ fontWeight: 700, marginBottom: '16px' }}>Revenue Analytics</h3>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '16px', marginBottom: '24px' }}>
                                {[{ l: 'This Month', v: '₹8,47,200', ch: '+18%' }, { l: 'Last Month', v: '₹7,18,400', ch: null }, { l: 'This Year', v: '₹62,40,000', ch: '+34%' }].map(s => <div key={s.l} style={{ padding: '20px', borderRadius: '14px', background: 'rgba(255,255,255,.03)', border: '1px solid rgba(255,255,255,.06)' }}>
                                    <div style={{ fontSize: '22px', fontWeight: 700, color: '#f472b6' }}>{s.v}</div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '6px' }}><span style={{ fontSize: '12px', color: 'rgba(255,255,255,.42)' }}>{s.l}</span>{s.ch && <span style={{ fontSize: '12px', color: '#6ee7b7', fontWeight: 700 }}>{s.ch}</span>}</div>
                                </div>)}
                            </div>
                            <div style={{ height: '140px', display: 'flex', alignItems: 'flex-end', gap: '6px' }}>
                                {[42, 65, 55, 82, 70, 90, 85, 95, 78, 88, 93, 100].map((h, i) => <div key={i} style={{ flex: 1, borderRadius: '6px 6px 0 0', background: 'linear-gradient(to top,#E85D9A,#8B5CF6)', height: h + '%' }}></div>)}
                            </div>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: '8px', fontSize: '10px', color: 'rgba(255,255,255,.25)' }}>
                                {['J', 'F', 'M', 'A', 'M', 'J', 'J', 'A', 'S', 'O', 'N', 'D'].map((m, i) => <span key={i}>{m}</span>)}
                            </div>
                        </div>}
                        {tab === 'coupons' && <div className="glass" style={{ borderRadius: '20px', padding: '24px' }}>
                            <h3 style={{ fontWeight: 700, marginBottom: '16px' }}>Active Coupons</h3>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                {[{ code: 'HAPPY20', disc: '20% Off', used: 1247, lim: 5000 }, { code: 'GIFT10', disc: '10% Off', used: 3892, lim: 10000 }, { code: 'LOVE15', disc: '15% Off', used: 567, lim: 2000 }, { code: 'HARDYY25', disc: '25% Off', used: 89, lim: 500 }].map(c => (
                                    <div key={c.code} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '16px', borderRadius: '14px', background: 'rgba(255,255,255,.03)', border: '1px solid rgba(255,255,255,.06)' }}>
                                        <div><div style={{ fontFamily: 'monospace', fontWeight: 700, color: '#f472b6', fontSize: '15px' }}>{c.code}</div><div style={{ fontSize: '12px', color: 'rgba(255,255,255,.38)', marginTop: '3px' }}>{c.disc} - {c.used}/{c.lim} used</div></div>
                                        <div style={{ width: '100px' }}><div style={{ height: '6px', background: 'rgba(255,255,255,.08)', borderRadius: '3px' }}><div style={{ height: '6px', background: '#E85D9A', borderRadius: '3px', width: ((c.used / c.lim) * 100) + '%' }}></div></div><div style={{ fontSize: '10px', color: 'rgba(255,255,255,.25)', marginTop: '4px', textAlign: 'right' }}>{Math.round((c.used / c.lim) * 100)}% used</div></div>
                                    </div>
                                ))}
                            </div>
                        </div>}
                        {!['dashboard', 'tracking', 'analytics', 'coupons'].includes(tab) && <div className="glass" style={{ borderRadius: '20px', padding: '80px', textAlign: 'center' }}><div style={{ fontSize: '48px', marginBottom: '12px' }}>🔧</div><h3 style={{ fontWeight: 700, color: 'rgba(255,255,255,.52)', textTransform: 'capitalize' }}>{tab} Panel</h3><p style={{ fontSize: '13px', color: 'rgba(255,255,255,.28)', marginTop: '8px' }}>Full {tab} management interface coming soon</p></div>}
                    </div>
                </div>
            );
        }

        // ── DELIVERY PARTNER PANEL ────────────────────────────────────────────────────
        function DeliveryPanel({ onClose, toast_ }) {
            const [tracking, setTracking] = useState(false);
            const [coords, setCoords] = useState(null);
            const [currentOrderId, setCurrentOrderId] = useState('EDP-482910');
            const intervalRef = React.useRef(null);
            const wsRef = React.useRef(null);

            const startTracking = () => {
                setTracking(true);
                toast_('🚀 Simulated GPS Tracking Started! Emitting live coordinates.');

                const emitCoords = () => {
                    const latVal = 19.0760 + (Math.random() - 0.5) * 0.02;
                    const lngVal = 72.8777 + (Math.random() - 0.5) * 0.02;
                    const simData = {
                        partnerId: 'DLV-PARTNER-01',
                        lat: latVal,
                        lng: lngVal,
                        speed: Math.floor(20 + Math.random() * 15) + ' km/h',
                        timestamp: new Date().toISOString(),
                        orderId: currentOrderId
                    };
                    setCoords(simData);
                    try {
                        localStorage.setItem('hardyy_live_gps', JSON.stringify(simData));
                    } catch (e) {
                        console.error(e);
                    }
                };

                emitCoords();
                intervalRef.current = setInterval(emitCoords, 3000);
            };

            const stopTracking = () => {
                if (intervalRef.current) clearInterval(intervalRef.current);
                setTracking(false);
                toast_('🛑 GPS Tracking Stopped.');
            };

            useEffect(() => {
                return () => {
                    if (intervalRef.current) clearInterval(intervalRef.current);
                };
            }, []);

            return (
                <div style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(0,0,0,.92)', backdropFilter: 'blur(8px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '16px' }}>
                    <div className="glass slide-in" style={{ maxWidth: '480px', width: '100%', borderRadius: '28px', padding: '36px', position: 'relative', border: '1px solid rgba(16,185,129,.3)' }}>
                        <button onClick={onClose} style={{ position: 'absolute', top: '16px', right: '16px', background: 'none', border: 'none', color: 'rgba(255,255,255,.4)', cursor: 'pointer', fontSize: '22px', lineHeight: 1 }}>&#x2715;</button>
                        <div style={{ textAlign: 'center', marginBottom: '24px' }}>
                            <div style={{ fontSize: '48px', marginBottom: '12px' }}>🛵</div>
                            <h3 style={{ fontFamily: "'Playfair Display',serif", fontSize: '24px', fontWeight: 700, color: '#6ee7b7' }}>Delivery Partner App</h3>
                            <p style={{ color: 'rgba(255,255,255,.42)', fontSize: '13px', marginTop: '4px' }}>Live GPS Tracking Simulation</p>
                        </div>
                        <div style={{ marginBottom: '16px' }}>
                            <label style={{ fontSize: '12px', color: 'rgba(255,255,255,.42)', display: 'block', marginBottom: '6px', textAlign: 'left' }}>Order ID to Track</label>
                            <input type="text" value={currentOrderId} onChange={e => setCurrentOrderId(e.target.value)} className="glass-input" style={{ width: '100%', padding: '10px 14px', borderRadius: '12px', fontSize: '14px' }} disabled={tracking} />
                        </div>
                        <div style={{ padding: '20px', borderRadius: '16px', background: 'rgba(255,255,255,.03)', border: '1px solid rgba(255,255,255,.08)', marginBottom: '24px', textAlign: 'center' }}>
                            <div style={{ fontSize: '12px', color: 'rgba(255,255,255,.4)', marginBottom: '8px' }}>STATUS</div>
                            <div style={{ fontSize: '18px', fontWeight: 700, color: tracking ? '#10B981' : '#F59E0B', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
                                <span style={{ width: '10px', height: '10px', borderRadius: '50%', background: tracking ? '#10B981' : '#F59E0B', boxShadow: tracking ? '0 0 10px #10B981' : 'none' }}></span>
                                {tracking ? 'Broadcasting Location (Every 10s)' : 'Idle / Offline'}
                            </div>
                            {coords && (
                                <div style={{ marginTop: '14px', paddingTop: '14px', borderTop: '1px dashed rgba(255,255,255,.1)', fontSize: '12px', color: 'rgba(255,255,255,.7)' }}>
                                    <div>📍 Lat: <strong style={{ color: '#6ee7b7' }}>{coords.lat?.toFixed(5)}</strong> | Lng: <strong style={{ color: '#6ee7b7' }}>{coords.lng?.toFixed(5)}</strong></div>
                                    <div style={{ marginTop: '4px' }}>⚡ Speed: <strong>{coords.speed}</strong> | Last Emit: {new Date(coords.timestamp).toLocaleTimeString()}</div>
                                </div>
                            )}
                        </div>
                        <div style={{ display: 'flex', gap: '12px' }}>
                            {!tracking ? (
                                <button onClick={startTracking} className="gbtn" style={{ flex: 1, padding: '16px', borderRadius: '14px', fontWeight: 700, fontSize: '14px', color: '#fff', border: 'none', cursor: 'pointer', background: 'linear-gradient(135deg,#10B981,#059669)' }}>🚀 Start GPS Broadcast</button>
                            ) : (
                                <button onClick={stopTracking} style={{ flex: 1, padding: '16px', borderRadius: '14px', fontWeight: 700, fontSize: '14px', color: '#fff', border: 'none', cursor: 'pointer', background: '#EF4444' }}>🛑 Stop Broadcast</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ── SHOP PANEL ────────────────────────────────────────────────────────────────
        function ShopPanel({ onClose }) {
            const [tab, setTab] = useState('orders');
            const TABS = ['orders', 'inventory', 'earnings', 'packing'];
            const orders = [
                { id: 'EDP-482910', c: 'Rahul M.', items: 'Eternal Rose Box + Velvet Packaging + Handwritten Letter', st: 'new', a: '₹3,299', t: '5m' },
                { id: 'EDP-481222', c: 'Priya S.', items: 'Chocolate Truffles + Standard Kraft + Silk Ribbon', st: 'packing', a: '₹1,799', t: '20m' },
                { id: 'EDP-480100', c: 'Ankit K.', items: 'Gourmet Tea Set + Premium Velvet Box', st: 'ready', a: '₹1,049', t: '45m' },
            ];
            return (
                <div style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(0,0,0,.92)', backdropFilter: 'blur(8px)', overflowY: 'auto' }}>
                    <div style={{ maxWidth: '900px', margin: '0 auto', padding: '32px 24px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '24px' }}>
                            <div><h2 style={{ fontFamily: "'Playfair Display',serif", fontSize: '26px', fontWeight: 700 }}>Shop Partner Dashboard</h2><p style={{ color: 'rgba(255,255,255,.38)', fontSize: '14px' }}>Flowers and More - Bandra Mumbai</p></div>
                            <button onClick={onClose} style={{ width: '40px', height: '40px', borderRadius: '12px', background: 'rgba(255,255,255,.06)', border: 'none', color: 'rgba(255,255,255,.6)', cursor: 'pointer', fontSize: '20px', lineHeight: 1 }}>&#x2715;</button>
                        </div>
                        <div style={{ display: 'flex', gap: '8px', marginBottom: '24px' }}>
                            {TABS.map(t => <button key={t} onClick={() => setTab(t)} style={{ padding: '8px 18px', borderRadius: '10px', fontSize: '12px', fontWeight: 700, border: 'none', cursor: 'pointer', textTransform: 'capitalize', background: tab === t ? '#8B5CF6' : 'rgba(255,255,255,.06)', color: tab === t ? '#fff' : 'rgba(255,255,255,.45)' }}>{t}</button>)}
                        </div>
                        {tab === 'orders' && <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: '12px', marginBottom: '8px' }}>
                                {[{ l: 'New Orders', v: '3', c: '#E85D9A' }, { l: 'In Packing', v: '2', c: '#F59E0B' }, { l: 'Ready', v: '1', c: '#10B981' }, { l: 'Today Earnings', v: '₹6,147', c: '#8B5CF6' }].map(s => (
                                    <div key={s.l} className="glass" style={{ borderRadius: '16px', padding: '16px', textAlign: 'center' }}>
                                        <div style={{ fontSize: '22px', fontWeight: 700, color: s.c }}>{s.v}</div>
                                        <div style={{ fontSize: '12px', color: 'rgba(255,255,255,.38)', marginTop: '4px' }}>{s.l}</div>
                                    </div>
                                ))}
                            </div>
                            {orders.map(o => <div key={o.id} className="glass" style={{ borderRadius: '18px', padding: '20px' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '16px' }}>
                                    <div>
                                        <div style={{ fontFamily: 'monospace', fontSize: '12px', color: '#a78bfa' }}>{o.id}</div>
                                        <div style={{ fontWeight: 700, marginTop: '4px', fontSize: '16px' }}>{o.c}</div>
                                        <div style={{ fontSize: '13px', color: 'rgba(255,255,255,.38)', marginTop: '3px' }}>{o.items}</div>
                                    </div>
                                    <div style={{ textAlign: 'right' }}><div style={{ fontWeight: 700, fontSize: '16px' }}>{o.a}</div><div style={{ fontSize: '11px', color: 'rgba(255,255,255,.28)', marginTop: '3px' }}>{o.t} ago</div></div>
                                </div>
                                <div style={{ display: 'flex', gap: '8px' }}>
                                    {o.st === 'new' && <button style={{ flex: 1, padding: '10px', borderRadius: '10px', background: 'rgba(16,185,129,.1)', border: 'none', color: '#6ee7b7', fontSize: '13px', fontWeight: 700, cursor: 'pointer' }}>Accept Order</button>}
                                    {o.st === 'packing' && <button style={{ flex: 1, padding: '10px', borderRadius: '10px', background: 'rgba(245,158,11,.1)', border: 'none', color: '#fcd34d', fontSize: '13px', fontWeight: 700, cursor: 'pointer' }}>Mark Packed</button>}
                                    {o.st === 'ready' && <button style={{ flex: 1, padding: '10px', borderRadius: '10px', background: 'rgba(59,130,246,.1)', border: 'none', color: '#93c5fd', fontSize: '13px', fontWeight: 700, cursor: 'pointer' }}>Dispatch to Rider</button>}
                                    <button style={{ padding: '10px 16px', borderRadius: '10px', background: 'rgba(255,255,255,.05)', border: '1px solid rgba(255,255,255,.08)', color: 'rgba(255,255,255,.55)', fontSize: '13px', fontWeight: 700, cursor: 'pointer' }}>Print</button>
                                </div>
                            </div>)}
                        </div>}
                        {tab === 'earnings' && <div className="glass" style={{ borderRadius: '20px', padding: '24px' }}>
                            <h3 style={{ fontWeight: 700, marginBottom: '16px' }}>Earnings Overview</h3>
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: '16px', marginBottom: '24px' }}>
                                {[{ l: 'Today', v: '₹6,147' }, { l: 'This Week', v: '₹31,200' }, { l: 'This Month', v: '₹1,24,800' }].map(s => <div key={s.l} style={{ padding: '24px', borderRadius: '14px', background: 'rgba(255,255,255,.03)', border: '1px solid rgba(255,255,255,.06)', textAlign: 'center' }}>
                                    <div style={{ fontSize: '22px', fontWeight: 700, color: '#a78bfa' }}>{s.v}</div>
                                    <div style={{ fontSize: '12px', color: 'rgba(255,255,255,.38)', marginTop: '6px' }}>{s.l}</div>
                                </div>)}
                            </div>
                            <div style={{ height: '120px', display: 'flex', alignItems: 'flex-end', gap: '6px' }}>
                                {[50, 70, 60, 85, 72, 90, 80, 95, 65, 88, 93, 100].map((h, i) => <div key={i} style={{ flex: 1, borderRadius: '4px 4px 0 0', background: 'linear-gradient(to top,#8B5CF6,#6366f1)', height: h + '%' }}></div>)}
                            </div>
                        </div>}
                        {!['orders', 'earnings'].includes(tab) && <div className="glass" style={{ borderRadius: '20px', padding: '80px', textAlign: 'center' }}><div style={{ fontSize: '48px', marginBottom: '12px' }}>🔧</div><h3 style={{ fontWeight: 700, color: 'rgba(255,255,255,.52)', textTransform: 'capitalize' }}>{tab} Module</h3><p style={{ fontSize: '13px', color: 'rgba(255,255,255,.28)', marginTop: '8px' }}>Full {tab} management coming soon</p></div>}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
